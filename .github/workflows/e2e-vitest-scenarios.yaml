          path: |
            e2e-artifacts/vitest/openclaw-inference-switch/
            /tmp/nemoclaw-e2e-openclaw-inference-switch-install.log
          include-hidden-files: false
          if-no-files-found: ignore
          retention-days: 14

      - name: Clean up Docker auth
        if: always()
        shell: bash
        run: |
          docker logout docker.io >/dev/null 2>&1 || true

  # ── PR result comment (mirrors nightly-e2e.yaml's report-to-pr) ───────────
  # Posts a results table on the open PR for the dispatching branch (or the
  # PR identified by `inputs.pr_number`). `if: always()` so the comment lands
  # even when scenario jobs failed — that's the whole point of a result
  # comment. Same shape as nightly-e2e.yaml:report-to-pr so reviewers see
  # consistent comment formatting across both suites.
  report-to-pr:
    runs-on: ubuntu-latest
    needs:
      [
        generate-matrix,
        live-scenarios,
        openshell-version-pin-vitest,
        onboard-negative-paths-vitest,
        skill-agent-vitest,
        openclaw-skill-cli-vitest,
        inference-routing-vitest,
        cloud-inference-vitest,
        credential-sanitization-vitest,
        credential-migration-vitest,
        sessions-agents-cli-vitest,
        runtime-overrides-vitest,
        hermes-e2e-vitest,
        hermes-root-entrypoint-smoke-vitest,
        network-policy-vitest,
        common-egress-agent-vitest,
        shields-config-vitest,
        rebuild-openclaw-vitest,
        sandbox-rebuild-vitest,
        state-backup-restore-vitest,
        token-rotation-vitest,
        messaging-providers-vitest,
        launchable-smoke-vitest,
        double-onboard-vitest,
        model-router-provider-routed-inference-vitest,
        sandbox-survival-vitest,
        gateway-drift-preflight-vitest,
        openclaw-tui-chat-correlation-vitest,
        gateway-guard-recovery,
        issue-4434-tui-unreachable-inference-vitest,
        openclaw-inference-switch-vitest,
      ]
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post Vitest scenario results to PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          JOB_PR_NUMBER: ${{ inputs.pr_number }}
          JOB_SCENARIOS: ${{ inputs.scenarios }}
          JOBS: ${{ inputs.jobs }}
        with:
          script: |
            const needs = ${{ toJSON(needs) }};
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const workflowBranch = context.ref.replace('refs/heads/', '');
            const prNumberInput = process.env.JOB_PR_NUMBER || '';
            const rawRequestedScenarios = process.env.JOB_SCENARIOS || '';
            const rawRequestedJobs = process.env.JOBS || '';
            const selectorValidationPassed = needs['generate-matrix']?.result === 'success';
            const requestedScenarios = selectorValidationPassed ? rawRequestedScenarios : '';
            const requestedJobs = selectorValidationPassed ? rawRequestedJobs : '';
            const scenariosRejected = rawRequestedScenarios && !selectorValidationPassed;
            const jobsRejected = rawRequestedJobs && !selectorValidationPassed;

            let prNumber = prNumberInput ? Number.parseInt(prNumberInput, 10) : undefined;
            if (!prNumber) {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${workflowBranch}`,
                state: 'open',
              });
              if (prs.length === 0) {
                core.info(`No open PR found for branch ${workflowBranch} — skipping comment.`);
                return;
              }
              prNumber = prs[0].number;
            }

            const emoji = { success: '✅', failure: '❌', cancelled: '⚠️', skipped: '⏭️' };
            const entries = Object.entries(needs).sort(([a], [b]) => a.localeCompare(b));
            const rows = entries.map(
              ([name, { result }]) => `| ${name} | ${emoji[result] || '❓'} ${result} |`,
            );
            const ran = entries.filter(([, v]) => v.result !== 'skipped');
            const passed = ran.filter(([, v]) => v.result === 'success');
            const failed = ran.filter(([, v]) => v.result === 'failure');
            const skipped = entries.filter(([, v]) => v.result === 'skipped');
            const status =
              failed.length > 0
                ? '❌ Some jobs failed'
                : skipped.length > 0 && passed.length === 0
                  ? '⚠️ No jobs ran'
                  : '✅ All jobs passed';

            const lines = [
              `### Vitest E2E Scenario Results — ${status}`,
              '',
              `**Run:** [${context.runId}](${runUrl})`,
              `**Workflow ref:** \`${workflowBranch}\``,
              scenariosRejected
                ? '**Requested scenarios:** _(selector rejected by workflow validation)_'
                : requestedScenarios
                  ? `**Requested scenarios:** \`${requestedScenarios}\``
                  : '**Requested scenarios:** _(default — all supported)_',
              jobsRejected
                ? '**Requested jobs:** _(selector rejected by workflow validation)_'
                : requestedJobs
                  ? `**Requested jobs:** \`${requestedJobs}\``
                  : '**Requested jobs:** _(default — all free-standing when no scenarios are requested)_',
              `**Summary:** ${passed.length} passed, ${failed.length} failed, ${skipped.length} skipped`,
              '',
              '| Job | Result |',
              '|-----|--------|',
              ...rows,
            ];
            if (failed.length > 0) {
              const failedNames = failed.map(([name]) => name).join(', ');
              lines.push('', `> **Failed jobs:** ${failedNames}. Check [run artifacts](${runUrl}) for logs.`);
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: lines.join('\n'),
            });
