name: E2E / Branch Validation

# ─── Branch Validation E2E ───────────────────────────────────────────────────
#
# PURPOSE: Validates a specific git branch by installing NemoClaw FROM SOURCE
# on an ephemeral Brev cloud instance. Answers the question: "Does this branch
# work if you install from source on a clean machine?"
#
# HOW IT WORKS:
#   1. Provisions a fresh Brev CPU instance (~4 vCPU, 16 GB RAM)
#   2. Rsyncs the checked-out branch code to the VM
#   3. Runs install.sh from source + onboards a sandbox
#   4. Executes the selected test suite against the live sandbox
#   5. Tears down the instance (unless keep_alive=true)
#
# WHEN TO USE:
#   - Before merging a PR that touches onboard, sandbox, security, or infra
#   - To validate a branch works end-to-end on a clean Linux environment
#   - To run security regression suites (credential-sanitization, injection)
#   - Manually via workflow_dispatch, or called from other workflows
#
# NOTE: This does NOT test the community install path (launch-plugin.sh).
# For validating what Brev Launchable users actually get, see the
# e2e-launchable-smoke job in nightly-e2e.yaml.
#
# Test suites:
#   full                     — Install → onboard → sandbox verify → live inference
#                              against NVIDIA Endpoints → CLI operations. Tests the
#                              complete user journey. (~10 min, destroys sandbox)
#   credential-sanitization  — 24 tests validating PR #743: credential stripping from
#                              migration snapshots, auth-profiles.json deletion, blueprint
#                              digest verification, symlink traversal protection, and
#                              runtime sandbox credential checks. Requires running sandbox.
#   telegram-injection       — 18 tests validating PR #584: command injection prevention
#                              through $(cmd), backticks, quote breakout, ${VAR} expansion,
#                              process table leak checks, and SANDBOX_NAME validation.
#                              Requires running sandbox.
#   messaging-providers      — 20+ tests validating PR #1081: provider creation, credential
#                              isolation, openclaw.json config patching, network reachability,
#                              and L7 proxy token rewriting for Telegram + Discord. Creates
#                              its own sandbox (e2e-msg-provider). (~15 min)
#   dashboard-remote-bind    — Verifies opt-in remote dashboard forwards bind 0.0.0.0.
#   gpu                      — Provisions a Brev GPU VM and runs the Ollama GPU E2E
#                              sandbox proof suite from source. (~45 min)
#   all                      — Runs credential-sanitization + telegram-injection (NOT full,
#                              which destroys the sandbox the security tests need).
#
# Required secrets: BREV_API_KEY + BREV_ORG_ID (or legacy BREV_API_TOKEN), NVIDIA_API_KEY
# Instance cost: Brev CPU credits (~$0.10/run for 4x16 instance)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (resolves branch automatically)"
        required: false
        default: ""
      test_suite:
        description: "Test suite to run (see workflow header for descriptions)"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - credential-sanitization
          - telegram-injection
          - messaging-providers
          - dashboard-remote-bind
          - gpu
          - all
      use_launchable:
        description: "Use CI launchable (true) or bare brev create + brev-setup.sh (false)"
        required: false
        type: boolean
        default: true
      keep_alive:
        description: "Keep Brev instance alive after tests (for SSH debugging)"
        required: false
        type: boolean
        default: false
      brev_token:
        description: "Brev refresh token (overrides BREV_API_TOKEN secret if provided)"
        required: false
        default: ""
      brev_provider:
        description: "Brev provider filter for provisioning (blank = Brev default/any)"
        required: false
        default: ""
      brev_gpu_type:
        description: "Exact Brev GPU instance type for test_suite=gpu (overrides GPU filters)"
        required: false
        default: ""
      brev_gpu_name:
        description: "GPU name filter for test_suite=gpu (blank = any GPU)"
        required: false
        default: ""
      brev_gpu_min_vram:
        description: "Minimum total GPU VRAM in GB for test_suite=gpu"
        required: false
        default: "20"
      brev_create_timeout_seconds:
        description: "Brev create timeout in seconds"
        required: false
        default: ""
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      pr_number:
        required: false
        type: string
        default: ""
      test_suite:
        required: false
        type: string
        default: "full"
      use_launchable:
        required: false
        type: boolean
        default: true
      setup_script_url:
        required: false
        type: string
        default: ""
      keep_alive:
        required: false
        type: boolean
        default: true
      brev_provider:
        required: false
        type: string
        default: ""
      brev_gpu_type:
        required: false
        type: string
        default: ""
      brev_gpu_name:
        required: false
        type: string
        default: ""
      brev_gpu_min_vram:
        required: false
        type: string
        default: "20"
      brev_create_timeout_seconds:
        required: false
        type: string
        default: ""
    secrets:
      BREV_API_TOKEN:
        required: false
      BREV_API_KEY:
        required: false
      BREV_ORG_ID:
        required: false
      NVIDIA_API_KEY:
        required: true

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: e2e-branch-validation-${{ inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e-branch-validation:
    # if: github.repository == 'NVIDIA/NemoClaw'  # Disabled for fork testing — re-enable before merge
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      BREV_E2E_INSTANCE_NAME: e2e-${{ inputs.pr_number || 'run' }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Resolve branch from PR number
        if: inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefName -q .headRefName)
          echo "Resolved PR #${{ inputs.pr_number }} → branch: $BRANCH"
          echo "RESOLVED_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Checkout target branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RESOLVED_BRANCH || inputs.branch || 'main' }}

      - name: Create check run (pending)
        if: inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_SHA=$(gh pr view ${{ inputs.pr_number }} --json headRefOid -q .headRefOid)
          CHECK_RUN_ID=$(gh api repos/${{ github.repository }}/check-runs \
            -f name="Brev E2E (${{ inputs.test_suite }})" \
            -f head_sha="$PR_SHA" \
            -f status="in_progress" \
            -f "output[title]=Running on ephemeral Brev instance" \
            -f "output[summary]=Tests in progress..." \
            --jq '.id')
          echo "CHECK_RUN_ID=$CHECK_RUN_ID" >> "$GITHUB_ENV"
          echo "PR_SHA=$PR_SHA" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Brev CLI
        env:
          BREV_API_TOKEN: ${{ inputs.brev_token || secrets.BREV_API_TOKEN }}
          BREV_API_KEY: ${{ secrets.BREV_API_KEY }}
          BREV_ORG_ID: ${{ secrets.BREV_ORG_ID }}
        run: |
          # Brev CLI v0.6.324+ — CPU instances use `brev search cpu | brev create`
          # Startup scripts use `brev create --startup-script @file` (not brev start --cpu)
          curl -fsSL -o /tmp/brev.tar.gz "https://github.com/brevdev/brev-cli/releases/download/v0.6.324/brev-cli_0.6.324_linux_amd64.tar.gz"
          tar -xzf /tmp/brev.tar.gz -C /usr/local/bin brev
          chmod +x /usr/local/bin/brev

          if [ -n "${BREV_API_KEY:-}" ] && [ -n "${BREV_ORG_ID:-}" ]; then
            brev login --api-key "$BREV_API_KEY" --org-id "$BREV_ORG_ID"
          else
            # Legacy fallback for older callers that still pass a refresh token.
            if [ -z "${BREV_API_TOKEN:-}" ]; then
              echo "::error::Brev auth is empty — set BREV_API_KEY/BREV_ORG_ID or BREV_API_TOKEN."
              exit 1
            fi
            mkdir -p ~/.brev
            umask 077
            printf '{"refresh_token":"%s"}' "$BREV_API_TOKEN" > ~/.brev/credentials.json
            chmod 600 ~/.brev/credentials.json
          fi
          # Skip the first-run onboarding wizard that blocks on stdin (also removed in #1470)
          mkdir -p ~/.brev
          printf '{"step":1,"hasRunBrevShell":true,"hasRunBrevOpen":true}' > ~/.brev/onboarding_step.json
          brev ls >/dev/null

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build CLI
        run: npm run build:cli

      - name: Run ephemeral Brev E2E
        env:
          BREV_API_TOKEN: ${{ inputs.brev_token || secrets.BREV_API_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          INSTANCE_NAME: ${{ env.BREV_E2E_INSTANCE_NAME }}
          TEST_SUITE: ${{ inputs.test_suite }}
          USE_LAUNCHABLE: ${{ inputs.use_launchable && '1' || '0' }}
          LAUNCHABLE_SETUP_SCRIPT: ${{ inputs.setup_script_url || '' }}
          BREV_PROVIDER: ${{ inputs.brev_provider || vars.BREV_PROVIDER || '' }}
          BREV_GPU_TYPE: ${{ inputs.brev_gpu_type || vars.BREV_GPU_TYPE || '' }}
          BREV_GPU_NAME: ${{ inputs.brev_gpu_name || vars.BREV_GPU_NAME || '' }}
          BREV_GPU_MIN_VRAM: ${{ inputs.brev_gpu_min_vram || vars.BREV_GPU_MIN_VRAM || '20' }}
          BREV_CREATE_TIMEOUT_SECONDS: ${{ inputs.brev_create_timeout_seconds || vars.BREV_CREATE_TIMEOUT_SECONDS || '' }}
          NEMOCLAW_GPU_E2E_MODEL: ${{ vars.NEMOCLAW_GPU_E2E_MODEL || 'qwen2.5:7b' }}
          KEEP_ALIVE: ${{ inputs.keep_alive }}
        run: npx vitest run --project e2e-branch-validation --silent=false --reporter=default

      - name: Update check run (completed)
        if: always() && inputs.pr_number != '' && env.CHECK_RUN_ID != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CONCLUSION=${{ job.status == 'success' && 'success' || 'failure' }}
          gh api repos/${{ github.repository }}/check-runs/${{ env.CHECK_RUN_ID }} \
            -X PATCH \
            -f status="completed" \
            -f conclusion="$CONCLUSION" \
            -f "output[title]=Brev E2E (${{ inputs.test_suite }}): ${CONCLUSION}" \
            -f "output[summary]=See workflow run for details."

      - name: Post PR comment
        if: always() && inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            EMOJI="✅"
            STATUS="PASSED"
          else
            EMOJI="❌"
            STATUS="FAILED"
          fi
          INSTANCE="${{ env.BREV_E2E_INSTANCE_NAME }}"
          BRANCH="${RESOLVED_BRANCH:-${{ inputs.branch || 'main' }}}"
          BODY="${EMOJI} **Brev E2E** (${{ inputs.test_suite }}): **${STATUS}** on branch \`${BRANCH}\` — [See logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          if [ "${{ inputs.keep_alive }}" = "true" ]; then
            BODY="${BODY}

          > **Instance \`${INSTANCE}\` is still running.** To SSH in:
          > \`\`\`
          > brev refresh && ssh ${INSTANCE}
          > \`\`\`
          > When done, delete it: \`brev delete ${INSTANCE}\`"
          fi
          gh pr comment ${{ inputs.pr_number }} --repo ${{ github.repository }} --body "$BODY"

      # Collect debugging artifacts from the Brev VM on failure before the
      # instance gets torn down. Captures the onboard log, sandbox list,
      # docker state, and gateway status so downstream onboard failures are
      # diagnosable without re-running with keep_alive=true.
      - name: Collect Brev debug bundle on failure
        if: failure()
        continue-on-error: true
        run: |
          INSTANCE="${{ env.BREV_E2E_INSTANCE_NAME }}"
          mkdir -p brev-debug-bundle
          brev refresh >/dev/null 2>&1 || true
          ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR \
              -o ConnectTimeout=10 "${INSTANCE}" \
              'set +e
               mkdir -p /tmp/nc-debug
               cp /tmp/nemoclaw-onboard.log /tmp/nc-debug/ 2>/dev/null || true
               timeout 15s openshell sandbox list  > /tmp/nc-debug/sandbox-list.txt 2>&1
               timeout 15s openshell gateway status > /tmp/nc-debug/gateway-status.txt 2>&1
               timeout 15s docker ps -a             > /tmp/nc-debug/docker-ps.txt 2>&1
               timeout 30s tar -C /tmp -czf /tmp/nc-debug.tar.gz nc-debug
              ' || true
          scp -o StrictHostKeyChecking=no -o LogLevel=ERROR \
              "${INSTANCE}:/tmp/nc-debug.tar.gz" brev-debug-bundle/ 2>/dev/null || true
          ls -la brev-debug-bundle/ || true

      - name: Upload Brev debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: brev-debug-bundle
          path: brev-debug-bundle/
          if-no-files-found: ignore

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-branch-validation-logs
          path: /tmp/brev-e2e-*.log
          if-no-files-found: ignore
