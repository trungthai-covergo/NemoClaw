preset:
  name: claude-code
  description: "Claude Code API, telemetry, and crash-report access"

network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: statsig.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: sentry.io
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/claude }
      - { path: /tmp/npm-global/bin/claude }
      - { path: /home/linuxbrew/.linuxbrew/bin/claude }
      # Claude Code is distributed as an npm CLI, so OpenShell may observe
      # the Node runtime instead of the shim that launched it.
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
